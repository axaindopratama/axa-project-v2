name: rbac-quality-gate

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]

jobs:
  rbac-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run RBAC CI gate
        run: npm run rbac:ci
